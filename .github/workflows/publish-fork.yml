on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.2-fork)'
        required: true
        type: string

run-name: "Publish ${{ inputs.version || github.ref_name }}"

jobs:
  publish:
    name: Build + Publish to GitHub Packages
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: >-
            aarch64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,
            x86_64-apple-ios,x86_64-apple-darwin,
            x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,
            x86_64-pc-windows-gnu

      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build native libraries (all targets)
        run: |
          cd kmp-grpc-native
          # Build Apple targets natively
          for target in aarch64-apple-darwin aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios x86_64-apple-darwin; do
            cargo build --target "$target" --profile dev
          done
          # Build Linux/Windows via cross (Docker)
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-gnu; do
            cross build --target "$target" --profile dev
          done

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          VERSION="${{ inputs.version || github.ref_name }}"
          echo "Publishing version: $VERSION"
          ./gradlew publishAllPublicationsToGitHubPackagesRepository \
            -Pversion="$VERSION" \
            -x javadoc \
            -x :kmp-grpc-wellknown-ext:compileKotlinWasmJs \
            --no-daemon

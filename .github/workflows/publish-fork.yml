on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 2.0.2-fork)'
        required: true
        type: string

run-name: "Publish ${{ inputs.version || github.ref_name }}"

permissions:
  contents: read
  packages: write

env:
  VERSION: ${{ inputs.version || github.ref_name }}

jobs:
  build-apple:
    name: Build Apple
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios,x86_64-apple-darwin
      - name: Build Apple native libs
        run: |
          cd kmp-grpc-native
          for target in aarch64-apple-darwin aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios x86_64-apple-darwin; do
            cargo build --target "$target" --profile dev
          done
      - name: Upload Apple artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-apple
          path: kmp-grpc-native/target/
          compression-level: 0

  build-linux-win:
    name: Build Linux + Windows
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu
      - uses: docker/setup-buildx-action@v3
      - name: Install cross
        run: cargo install cross --git https://github.com/cross-rs/cross
      - name: Build Linux + Windows native libs
        run: |
          cd kmp-grpc-native
          for target in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-gnu; do
            cross build --target "$target" --profile dev
          done
      - name: Upload Linux/Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-linux-win
          path: kmp-grpc-native/target/
          compression-level: 0

  publish:
    name: Publish All
    needs: [build-apple, build-linux-win]
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download Apple artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-apple
          path: kmp-grpc-native/target/
      - name: Download Linux/Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: native-linux-win
          path: kmp-grpc-native/target/

      - name: Publish all to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # androidDebug conflicts with already-published artifacts (409)
          ./gradlew publishAllPublicationsToGitHubPackagesRepository \
            -Pversion="${VERSION}" \
            -x javadoc \
            -x :kmp-grpc-core:compileNativeCode \
            -x :kmp-grpc-wellknown-ext:compileKotlinWasmJs \
            -x :kmp-grpc-core:publishAndroidDebugPublicationToGitHubPackagesRepository \
            --no-daemon
